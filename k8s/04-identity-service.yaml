apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-service
  namespace: healthsys
  labels:
    app: identity-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: identity-service
  template:
    metadata:
      labels:
        app: identity-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8081"
    spec:
      containers:
        - name: identity-service
          image: ghcr.io/sachow12/healthsys-identity-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: SERVER_PORT
              value: "8081"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/healthsys_identity
            - name: SPRING_DATASOURCE_USERNAME
              value: postgres
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: healthsys-secrets
                  key: postgres-password
            - name: SPRING_RABBITMQ_HOST
              value: rabbitmq
            - name: SPRING_RABBITMQ_PORT
              value: "5672"
            - name: SPRING_RABBITMQ_USERNAME
              value: healthsys
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: healthsys-secrets
                  key: rabbitmq-password
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: healthsys-secrets
                  key: jwt-secret
            - name: BOOTSTRAP_ADMIN_EMAIL
              value: admin@healthsys.local
            - name: BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: healthsys-secrets
                  key: bootstrap-admin-password
            - name: BOOTSTRAP_ADMIN_NAME
              value: Administrator
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: identity-service
  namespace: healthsys
spec:
  selector:
    app: identity-service
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP
