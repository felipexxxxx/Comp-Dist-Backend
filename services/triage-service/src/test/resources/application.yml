spring:
  datasource:
    url: jdbc:h2:mem:triagedb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        auto-startup: false

jwt:
  secret: test-secret-key-for-testing-purposes-only-32ch

app:
  messaging:
    exchange: healthsys.events
    auth-logout-queue: healthsys.triage.auth-token-revoked
    auth-logout-routing-key: healthsys.auth.token-revoked

anthropic:
  api-key: ""
