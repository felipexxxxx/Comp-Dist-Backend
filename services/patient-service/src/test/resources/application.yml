spring:
  datasource:
    url: jdbc:h2:mem:patientdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        auto-startup: false

jwt:
  secret: test-secret-key-with-sufficient-length-123456

app:
  messaging:
    exchange: healthsys.events
    auth-logout-queue: healthsys.patient.auth-token-revoked
    auth-logout-routing-key: healthsys.auth.token-revoked
