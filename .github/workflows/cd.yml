name: CD

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - name: api-gateway
            dockerfile: services/api-gateway/Dockerfile
          - name: identity-service
            dockerfile: services/identity-service/Dockerfile
          - name: patient-service
            dockerfile: services/patient-service/Dockerfile
          - name: notification-service
            dockerfile: services/notification-service/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/healthsys-${{ matrix.service.name }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

  deploy-k8s:
    name: Deploy to Kubernetes (kind)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: healthsys-ci

      - name: Create namespace and GHCR pull secret
        run: |
          kubectl apply -f k8s/00-namespace.yaml
          kubectl create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            -n healthsys
          kubectl patch serviceaccount default -n healthsys \
            -p '{"imagePullSecrets":[{"name":"ghcr-pull-secret"}]}'

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/01-secrets.yaml
          kubectl apply -f k8s/02-postgres.yaml
          kubectl apply -f k8s/03-rabbitmq.yaml
          kubectl apply -f k8s/04-identity-service.yaml
          kubectl apply -f k8s/05-patient-service.yaml
          kubectl apply -f k8s/06-notification-service.yaml
          kubectl apply -f k8s/07-api-gateway.yaml

      - name: Update image tags to SHA
        run: |
          SHA_TAG="sha-$(echo ${{ github.sha }} | head -c 7)"
          for svc in api-gateway identity-service patient-service notification-service; do
            kubectl set image deployment/$svc \
              $svc=${{ env.IMAGE_PREFIX }}/healthsys-$svc:$SHA_TAG \
              -n healthsys
          done

      - name: Wait for rollout
        run: |
          for svc in api-gateway identity-service patient-service notification-service; do
            kubectl rollout status deployment/$svc -n healthsys --timeout=300s
          done
